<!DOCTYPE html>
<html>
<head>

<title>AVM Attendance</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    color:#1d5ce2;
}

#camera{
    width:90%;
    max-width:500px;
    aspect-ratio:1/1;
    background:black;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
}

button{
    margin-top:20px;
    font-size:30px;
    padding:20px;
}

#status{
    margin-top:20px;
    font-size:30px;
}

</style>

</head>

<body>

<h1>🎓 AVM Attendance</h1>

<div id="camera"></div>

<button onclick="startCamera()">
📷 Start Camera
</button>

<div id="status">
Waiting for scan...
</div>

<script>

let html5QrCode;
let scanInProgress = false;

function onScanSuccess(decodedText){

    if(scanInProgress){
        return;
    }

    scanInProgress = true;

    // Stop further scanning
    html5QrCode.stop();

    document.getElementById("status").innerHTML =
    "Processing " + decodedText + "...";

    fetch(
    "https://script.google.com/macros/s/AKfycbyUhzg3uX1Mgafq9XBXjpEw89Ol_D4-5iJaV7UiKH8G1ymUAODeFpKEyYSD5RqekMUkQA/exec?studentID="
    + encodeURIComponent(decodedText)
    )
    .then(response => response.json())
    .then(data => {

        document.getElementById("status").innerHTML =
        "<h2>"+data.studentName+"</h2>"
        +"<br>Status : "+data.status
        +"<br>"+data.message
        +"<br><br>Present Today : "+data.presentToday;

        // Allow next scan
        scanInProgress = false;

        // Restart camera automatically after 2 seconds
        setTimeout(function(){
            startCamera();
        },2000);

    })
    .catch(error => {

        document.getElementById("status").innerHTML =
        "Error connecting to server";

        scanInProgress = false;

        setTimeout(function(){
            startCamera();
        },2000);

    });

}

function startCamera(){

    if(html5QrCode){
        html5QrCode.clear().catch(()=>{});
    }

    html5QrCode =
    new Html5Qrcode("camera");

    html5QrCode.start(
    {facingMode:"environment"},
    {
        fps:10,
        qrbox:{
            width:800,
            height:800
        }
    },
    onScanSuccess
    );

}

</script>

</body>
</html>
